services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litestar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litestar_db"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/litestar_db
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
