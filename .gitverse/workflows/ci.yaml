name: CI — Lint & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Lint ────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check django_microservice/ fastapi_microservice/ litestar_microservice/ robyn_microservice/

  # ── Validate dependencies & imports ────────────────────
  validate:
    name: "${{ matrix.service }} — validate"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: django
            dir: django_microservice
          - service: fastapi
            dir: fastapi_microservice
          - service: litestar
            dir: litestar_microservice
          - service: robyn
            dir: robyn_microservice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Validate imports
        working-directory: ${{ matrix.dir }}
        run: python -c "import app; print('${{ matrix.service }}: imports OK')"

      - name: Validate Dockerfile exists
        working-directory: ${{ matrix.dir }}
        run: |
          test -f Dockerfile && echo "Dockerfile: OK" || (echo "Dockerfile: MISSING" && exit 1)
          test -f docker-compose.yml && echo "docker-compose.yml: OK" || (echo "docker-compose.yml: MISSING" && exit 1)
