upstream django_backend {
    server host.docker.internal:8000;
}

upstream fastapi_backend {
    server host.docker.internal:8001;
}

upstream litestar_backend {
    server host.docker.internal:8002;
}

upstream robyn_backend {
    server host.docker.internal:8003;
}

# Rate limiting: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # --- Health check for gateway itself ---
    location /gateway/health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway","version":"nginx"}';
        add_header Content-Type application/json;
    }

    # --- Django ---
    location /django/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://django_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    # --- FastAPI ---
    location /fastapi/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://fastapi_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    # --- Litestar ---
    location /litestar/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://litestar_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    # --- Robyn ---
    location /robyn/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://robyn_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    # --- Aggregated health check ---
    location /health {
        proxy_pass http://django_backend/health/;
        proxy_set_header X-Request-ID $request_id;
    }
}
