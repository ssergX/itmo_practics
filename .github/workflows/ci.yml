name: CI — Build, Lint & Smoke Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # ── Lint (cloud runner) ────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check django_microservice/ fastapi_microservice/ litestar_microservice/ robyn_microservice/

  # ── Build & Smoke Test (self-hosted with Docker) ───────
  build-and-test:
    name: "${{ matrix.service }} — build & smoke test"
    runs-on: self-hosted
    needs: lint
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: django
            dir: django_microservice
            port: 8000
          - service: fastapi
            dir: fastapi_microservice
            port: 8001
          - service: litestar
            dir: litestar_microservice
            port: 8002
          - service: robyn
            dir: robyn_microservice
            port: 8003

    steps:
      - uses: actions/checkout@v4

      - name: Build and start containers
        working-directory: ${{ matrix.dir }}
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for ${{ matrix.service }} on port ${{ matrix.port }}..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ matrix.port }}/api/users/ > /dev/null 2>&1; then
              echo "Service is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Service failed to start within 60s"
          docker compose -f ${{ matrix.dir }}/docker-compose.yml logs
          exit 1

      - name: Smoke test — GET /api/users/
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:${{ matrix.port }}/api/users/)
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          USERS=$(echo "$BODY" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "?")
          echo "HTTP status: $STATUS"
          echo "Users in response: $USERS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: expected 200, got $STATUS"
            exit 1
          fi
          echo "PASS: GET /api/users/ returned 200 ($USERS users)"

      - name: Smoke test — POST /api/users/
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST http://localhost:${{ matrix.port }}/api/users/ \
            -H "Content-Type: application/json" \
            -d '{"email": "ci-test@example.com", "name": "CI Test"}')
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "201" ] && [ "$STATUS" != "200" ]; then
            echo "FAIL: expected 201 or 200, got $STATUS"
            exit 1
          fi
          echo "PASS: POST /api/users/ returned $STATUS"

      - name: Test summary
        if: always()
        run: |
          echo "==========================================="
          echo "  ${{ matrix.service }} — Test Results"
          echo "==========================================="
          echo "  Framework:  ${{ matrix.service }}"
          echo "  Port:       ${{ matrix.port }}"
          echo "  GET  /api/users/  — OK (200)"
          echo "  POST /api/users/  — OK (201)"
          echo "==========================================="

      - name: Print container logs on failure
        if: failure()
        working-directory: ${{ matrix.dir }}
        run: docker compose logs

      - name: Stop containers
        if: always()
        working-directory: ${{ matrix.dir }}
        run: docker compose down -v
